<h1>Instant Crypto Compliance Audit</h1>

<form id="auditForm">
  <input type="text" id="company" placeholder="Company Name" required />
  <input type="text" id="country" placeholder="Country" required />
  <input type="text" id="activity" placeholder="Activity Type" required />
  <button type="submit">Generate</button>
</form>

<pre id="result"></pre>

<script>
document.querySelector("form").addEventListener("submit", async function (e) {
  e.preventDefault();

  const activity = document.getElementById("activity").value;

  const res = await fetch("/api/orchestrator", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ activity })
  });

  const data = await res.json();

  document.getElementById("result").innerText =
    "Overall Score: " + data.overallScore +
    "\n\nCrawler Score: " + data.crawlerScore +
    "\nTokenomics Score: " + data.tokenomicsScore +
    "\n\nVARA Category: " + data.varaLicenseCategory +
    "\nVARA Risk Level: " + data.varaRiskLevel +
    "\n\nExplanation: " + data.varaExplanation +
    "\n\nRecommended Action: " + data.recommendedAction;
});
</script>
